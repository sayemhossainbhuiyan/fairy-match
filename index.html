<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Match</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#9B7EDE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fairy Match">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender-50:#F5F0FF;
    --lavender-100:#E8DBFF;
    --purple-500:#9B7EDE;
    --purple-700:#6C4FB0;
    --pink-100:#FFE1EC;
    --pink-400:#FF8FB1;
    --pink-600:#E85D8A;
    --gold-400:#FFD166;
    --gold-600:#E6A82E;
    --mint-300:#8CE0C4;
    --white:#FFFFFF;
    --ink:#4A3B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    background: linear-gradient(160deg, var(--lavender-50) 0%, var(--pink-100) 60%, #FFF3D6 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 48px;
    color: var(--ink);
    overflow-x:hidden;
  }
  .title-wrap{
    text-align:center;
    margin-bottom:6px;
  }
  h1{
    font-family:'Fredoka', sans-serif;
    font-size:clamp(28px, 6vw, 42px);
    font-weight:700;
    margin:0;
    color: var(--purple-700);
    letter-spacing:0.5px;
  }
  .subtitle{
    font-size:16px;
    font-weight:700;
    color: var(--pink-600);
    margin-top:4px;
  }
  .stats{
    display:flex;
    gap:14px;
    margin: 18px 0 22px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .stat-pill{
    background: var(--white);
    border-radius:999px;
    padding:8px 20px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:15px;
    color: var(--purple-700);
    box-shadow: 0 4px 0 rgba(155,126,222,0.25);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .board{
    display:grid;
    grid-template-columns: repeat(4, minmax(60px, 84px));
    gap:12px;
    perspective: 1000px;
  }
  .card{
    width: 100%;
    aspect-ratio: 1 / 1;
    position:relative;
    cursor:pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,1.6,.5,1);
  }
  .card.flipped{
    transform: rotateY(180deg);
  }
  .card.matched{
    transform: rotateY(180deg);
    animation: pop 0.5s ease;
  }
  @keyframes pop{
    0%{ transform: rotateY(180deg) scale(1); }
    50%{ transform: rotateY(180deg) scale(1.12); }
    100%{ transform: rotateY(180deg) scale(1); }
  }
  .face{
    position:absolute;
    inset:0;
    border-radius:16px;
    backface-visibility:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
  }
  .face.back{
    background: linear-gradient(145deg, var(--purple-500), var(--purple-700));
    box-shadow: 0 5px 0 #5A3F94, 0 6px 10px rgba(108,79,176,0.35);
    font-size:26px;
  }
  .face.front{
    background: var(--white);
    transform: rotateY(180deg);
    box-shadow: 0 5px 0 var(--lavender-100), 0 6px 10px rgba(155,126,222,0.2);
  }
  .card.matched .face.front{
    background: linear-gradient(145deg, #FFF8E6, var(--gold-400));
    box-shadow: 0 5px 0 var(--gold-600), 0 6px 14px rgba(255,209,102,0.5);
  }
  .win-banner{
    display:none;
    margin-top:24px;
    text-align:center;
    background: var(--white);
    border-radius:20px;
    padding:24px 32px;
    box-shadow: 0 6px 0 var(--pink-400), 0 10px 20px rgba(232,93,138,0.25);
    max-width: 360px;
  }
  .win-banner.show{
    display:block;
    animation: bounceIn 0.6s ease;
  }
  @keyframes bounceIn{
    0%{ transform: scale(0.7); opacity:0; }
    60%{ transform: scale(1.05); opacity:1; }
    100%{ transform: scale(1); }
  }
  .win-banner .big{
    font-family:'Fredoka', sans-serif;
    font-size:24px;
    color: var(--pink-600);
    margin:0 0 8px;
  }
  .win-banner p{
    margin:4px 0;
    font-weight:700;
  }
  button.restart{
    margin-top:14px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:16px;
    background: var(--gold-400);
    border:none;
    color:#6B4A00;
    padding:12px 26px;
    border-radius:999px;
    cursor:pointer;
    box-shadow: 0 4px 0 var(--gold-600);
  }
  button.restart:active{
    box-shadow: none;
    transform: translateY(4px);
  }
  .sparkle{
    position:fixed;
    top:-20px;
    font-size:20px;
    animation: fall linear forwards;
    pointer-events:none;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(360deg); opacity:0.2; }
  }
  @media (max-width:420px){
    .board{ grid-template-columns: repeat(4, minmax(52px, 74px)); gap:9px; }
    .face{ font-size:28px; }
    .face.back{ font-size:22px; }
  }
</style>
</head>
<body>

  <div class="title-wrap">
    <h1>✨ Fairy Match ✨</h1>
    <div class="subtitle">Find all the magical pairs!</div>
  </div>

  <div class="stats">
    <div class="stat-pill">🌟 Moves: <span id="moves">0</span></div>
    <div class="stat-pill">💖 Pairs: <span id="pairs">0</span>/8</div>
  </div>

  <div class="board" id="board"></div>

  <div class="win-banner" id="winBanner">
    <p class="big">🎉 You found them all! 🎉</p>
    <p>It took <span id="finalMoves"></span> moves!</p>
    <button class="restart" onclick="startGame()">Play again</button>
  </div>

<script>
  const icons = ['👑','🪄','🏰','🦄','💎','🌈','🦋','⭐'];
  let cards = [];
  let flipped = [];
  let matchedCount = 0;
  let moves = 0;
  let lock = false;

  function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function startGame(){
    const deck = shuffle([...icons, ...icons]);
    cards = deck.map((icon, i) => ({ id:i, icon, flipped:false, matched:false }));
    flipped = [];
    matchedCount = 0;
    moves = 0;
    lock = false;
    document.getElementById('moves').textContent = 0;
    document.getElementById('pairs').textContent = 0;
    document.getElementById('winBanner').classList.remove('show');
    renderBoard();
  }

  function renderBoard(){
    const board = document.getElementById('board');
    board.innerHTML = '';
    cards.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card' + (card.flipped ? ' flipped' : '') + (card.matched ? ' matched' : '');
      el.onclick = () => handleFlip(card.id);
      el.innerHTML = `
        <div class="face back">🪄</div>
        <div class="face front">${card.icon}</div>
      `;
      board.appendChild(el);
    });
  }

  function handleFlip(id){
    if(lock) return;
    const card = cards.find(c => c.id === id);
    if(card.flipped || card.matched) return;
    card.flipped = true;
    flipped.push(card);
    renderBoard();

    if(flipped.length === 2){
      lock = true;
      moves++;
      document.getElementById('moves').textContent = moves;
      const [a, b] = flipped;
      if(a.icon === b.icon){
        setTimeout(() => {
          a.matched = true;
          b.matched = true;
          matchedCount++;
          document.getElementById('pairs').textContent = matchedCount;
          flipped = [];
          lock = false;
          renderBoard();
          if(matchedCount === icons.length){
            setTimeout(() => {
              document.getElementById('finalMoves').textContent = moves;
              document.getElementById('winBanner').classList.add('show');
              launchSparkles();
            }, 300);
          }
        }, 500);
      } else {
        setTimeout(() => {
          a.flipped = false;
          b.flipped = false;
          flipped = [];
          lock = false;
          renderBoard();
        }, 800);
      }
    }
  }

  function launchSparkles(){
    const emojis = ['✨','🌟','💖','🎀'];
    for(let i = 0; i < 30; i++){
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        s.style.left = Math.random()*100 + 'vw';
        s.style.animationDuration = (2 + Math.random()*2) + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 4000);
      }, i * 80);
    }
  }

  startGame();

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
